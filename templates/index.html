<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PERUN Dashboard</title>

<style>
body {
  margin: 0;
  background: #08090c;
  color: #c9d1d9;
  font-family: sans-serif;
}

.sidebar {
  width: 220px;
  background: #0e1117;
  height: 100vh;
  padding: 20px;
  border-right: 1px solid #1e2433;
}

.sidebar h2 {
  color: white;
}

.nav-item {
  padding: 10px;
  cursor: pointer;
}

.nav-item:hover {
  background: #151921;
}

.main {
  flex: 1;
  padding: 20px;
}

.container {
  display: flex;
}

.card {
  background: #151921;
  border: 1px solid #1e2433;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>PERUN</h2>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Users</div>
    <div class="nav-item">Devices</div>
    <div class="nav-item">Incidents</div>
  </div>

  <div class="main">
    <h1>DASHBOARD</h1>

    <div class="card">
      Devices Online: 7 / 10
    </div>

    <div class="card">
      Active Users: 6
    </div>

    <div class="card">
      P1 Incidents: 2
    </div>

    <div class="card">
      Alerts: 4
    </div>

  </div>

</div>

</body>
</html>
